<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SSTranslator AI - Fixed Version</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,1,0" />

    <style>
        :root {
            --primary: #6366f1;
            --accent: #f59e0b;
            --bg: #f8fafc;
            --text: #1e293b;
        }

        * { box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        
        body { 
            margin: 0; background: #e2e8f0; 
            height: 100dvh; display: flex; justify-content: center; align-items: center; 
        }

        .app-card {
            width: 100%; max-width: 500px; height: 95vh;
            background: white; display: flex; flex-direction: column;
            box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1);
            position: relative; overflow: hidden;
        }

        @media (min-width: 768px) { .app-card { border-radius: 24px; height: 85vh; } }

        /* Header */
        header {
            padding: 20px; background: white; border-bottom: 1px solid #f1f5f9;
            display: flex; justify-content: space-between; align-items: center;
        }

        .logo { font-weight: 800; font-size: 1.2rem; color: var(--primary); margin: 0; }
        .logo span { color: var(--accent); }

        /* Chat Area */
        #chatBox {
            flex: 1; overflow-y: auto; padding: 20px;
            display: flex; flex-direction: column; gap: 15px; background: #f8fafc;
        }

        .msg { max-width: 85%; padding: 12px 16px; border-radius: 18px; position: relative; line-height: 1.5; }
        .msg-id { align-self: flex-start; background: white; color: var(--text); border: 1px solid #e2e8f0; border-bottom-left-radius: 4px; }
        .msg-ai { align-self: flex-end; background: var(--primary); color: white; border-bottom-right-radius: 4px; }

        .orig-txt { font-size: 0.75rem; opacity: 0.7; display: block; margin-bottom: 4px; text-transform: uppercase; }
        .trans-txt { font-weight: 600; font-size: 1rem; display: block; }
        .translit-txt { font-size: 0.85rem; font-style: italic; color: #fde047; display: block; margin-top: 4px; }
        .msg-id .translit-txt { color: var(--primary); }

        /* Control Panel */
        .controls {
            padding: 25px; background: white; border-top: 1px solid #f1f5f9;
        }

        .status-info { text-align: center; font-size: 0.7rem; font-weight: 700; color: #94a3b8; margin-bottom: 20px; text-transform: uppercase; letter-spacing: 1px; }

        /* FIX TOMBOL BERDEKATAN */
        .mic-section {
            display: flex;
            justify-content: space-evenly; /* Ini akan memberi jarak otomatis yang seimbang */
            align-items: center;
            width: 100%;
        }

        .mic-box { display: flex; flex-direction: column; align-items: center; gap: 10px; }

        .btn-mic {
            width: 65px; height: 65px; border-radius: 50%; border: none;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; transition: 0.3s; position: relative;
        }
        
        .btn-id { background: #f1f5f9; color: var(--primary); }
        .btn-ai { background: var(--primary); color: white; }

        .recording { background: #ef4444 !important; color: white !important; transform: scale(1.1); animation: pulse 1.5s infinite; }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.4); }
            70% { box-shadow: 0 0 0 15px rgba(239, 68, 68, 0); }
            100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); }
        }

        .lang-label { font-size: 0.65rem; font-weight: 800; color: #64748b; }

        select {
            padding: 6px 10px; border-radius: 8px; border: 1px solid #e2e8f0; font-size: 0.8rem; font-weight: 600;
        }
    </style>
</head>
<body>

    <div class="app-card">
        <header>
            <h1 class="logo">SS<span>Translator</span></h1>
            <select id="targetLang">
                <option value="Mandarin" data-code="zh-CN">🇨🇳 Mandarin</option>
                <option value="English" data-code="en-US">🇺🇸 English</option>
                <option value="Japanese" data-code="ja-JP">🇯🇵 Japanese</option>
                <option value="Korean" data-code="ko-KR">🇰🇷 Korean</option>
                <option value="Arabic" data-code="ar-SA">🇸🇦 Arabic</option>
            </select>
        </header>

        <div id="chatBox">
            <div class="msg msg-id">
                <span class="trans-txt">Halo! Siap menerjemahkan. Klik mic untuk bicara.</span>
            </div>
        </div>

        <div class="controls">
            <div id="status" class="status-info">System Ready</div>
            <div class="mic-section">
                <div class="mic-box">
                    <button id="btnID" class="btn-mic btn-id">
                        <span class="material-symbols-rounded">mic</span>
                    </button>
                    <span class="lang-label">INDONESIA</span>
                </div>

                <div class="mic-box">
                    <button id="btnOther" class="btn-mic btn-ai">
                        <span class="material-symbols-rounded">mic</span>
                    </button>
                    <span id="labelOther" class="lang-label">MANDARIN</span>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Masukkan API KEY di sini
        const API_KEY = "AQ.Ab8RN6JHRyIfuhzTq4sT8q9zwFv1rp0rVe235zE29i3QhCge8A";

        const chatBox = document.getElementById('chatBox');
        const status = document.getElementById('status');
        const targetLang = document.getElementById('targetLang');
        const labelOther = document.getElementById('labelOther');

        const Recognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        const speech = new Recognition();
        const synth = window.speechSynthesis;

        targetLang.onchange = () => {
            labelOther.innerText = targetLang.options[targetLang.selectedIndex].text.split(' ')[1].toUpperCase();
        };

        // Fungsi Mulai Rekam
        function startMic(lang, mode) {
            try {
                speech.lang = lang;
                speech.start();
                status.innerText = "Mendengarkan...";
                
                const currentBtn = (mode === 'id') ? document.getElementById('btnID') : document.getElementById('btnOther');
                currentBtn.classList.add('recording');

                speech.onresult = (event) => {
                    const resultText = event.results[0][0].transcript;
                    const toLang = (mode === 'id') ? targetLang.value : "Indonesian";
                    const fromLang = (mode === 'id') ? "Indonesian" : targetLang.value;
                    const tCode = (mode === 'id') ? targetLang.options[targetLang.selectedIndex].dataset.code : "id-ID";

                    callGemini(resultText, fromLang, toLang, mode, tCode);
                };

                speech.onend = () => {
                    currentBtn.classList.remove('recording');
                    status.innerText = "Selesai Mendengar";
                };

                speech.onerror = (err) => {
                    status.innerText = "Error Mic: " + err.error;
                    currentBtn.classList.remove('recording');
                };
            } catch (e) { alert("Mic sudah aktif atau tidak didukung"); }
        }

        async function callGemini(text, from, to, mode, tCode) {
            status.innerText = "AI Menerjemahkan...";
            
            const prompt = `Translate this: "${text}" from ${from} to ${to}. 
            If the target language is NOT latin (like Chinese, Japanese, Korean, Arabic), give transliteration.
            Response must be JSON: {"translation": "...", "transliteration": "..."}`;

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
                });

                const data = await response.json();
                
                // Logika pembersihan JSON dari AI
                let rawResp = data.candidates[0].content.parts[0].text;
                let cleanJson = rawResp.match(/\{.*\}/s)[0]; 
                let final = JSON.parse(cleanJson);

                addBubble(text, final.translation, final.transliteration, mode);
                
                // Suara
                const utter = new SpeechSynthesisUtterance(final.translation);
                utter.lang = tCode;
                synth.speak(utter);

                status.innerText = "Ready";

            } catch (err) {
                console.error(err);
                status.innerText = "AI Gagal / API Key Salah";
            }
        }

        function addBubble(orig, trans, translit, mode) {
            const div = document.createElement('div');
            div.className = `msg ${mode === 'id' ? 'msg-id' : 'msg-ai'}`;
            div.innerHTML = `
                <span class="orig-txt">${orig}</span>
                <span class="trans-txt">${trans}</span>
                ${translit ? `<span class="translit-txt">${translit}</span>` : ''}
            `;
            chatBox.appendChild(div);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        document.getElementById('btnID').onclick = () => startMic('id-ID', 'id');
        document.getElementById('btnOther').onclick = () => startMic(targetLang.options[targetLang.selectedIndex].dataset.code, 'other');

    </script>
</body>
</html>

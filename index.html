<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SSTranslator - AI Pro</title>
    <link rel="shortcut icon" href="img/favicon.ico">

    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,1,0" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        :root {
            --primary: #6366f1;
            --primary-light: #818cf8;
            --accent: #f59e0b;
            --bg-gradient: linear-gradient(135deg, #e0e7ff 0%, #f3e8ff 100%);
            --glass-bg: rgba(255, 255, 255, 0.7);
            --glass-border: rgba(255, 255, 255, 0.4);
            --text-dark: #1e293b;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: var(--bg-gradient);
            background-attachment: fixed;
            height: 100dvh;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            color: var(--text-dark);
        }

        /* Container Glassmorphism */
        .app-container {
            width: 100%;
            max-width: 900px;
            height: 100%;
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            display: flex;
            flex-direction: column;
            position: relative;
            border: 1px solid var(--glass-border);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.1);
        }

        @media (min-width: 768px) {
            .app-container {
                height: 85vh;
                border-radius: 32px;
            }
        }

        /* Header Modern */
        header {
            padding: 24px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(255, 255, 255, 0.3);
            border-bottom: 1px solid var(--glass-border);
            border-radius: inherit;
        }

        header h1 {
            font-size: 1.4rem;
            font-weight: 800;
            margin: 0;
            display: flex;
            align-items: center;
            gap: 10px;
            letter-spacing: -0.5px;
        }

        .brand-icon {
            background: linear-gradient(135deg, var(--accent), #f97316);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Language Selector Custom */
        .lang-select-wrapper {
            background: white;
            padding: 4px 12px;
            border-radius: 14px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
            border: 1px solid #e2e8f0;
        }

        .lang-select {
            border: none;
            font-size: 0.9rem;
            font-weight: 600;
            color: var(--text-dark);
            outline: none;
            background: transparent;
            cursor: pointer;
        }

        /* Chat Area */
        #chatBox {
            flex: 1;
            overflow-y: auto;
            padding: 30px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            scrollbar-width: thin;
        }

        #chatBox::-webkit-scrollbar {
            width: 6px;
        }

        #chatBox::-webkit-scrollbar-thumb {
            background: rgba(0, 0, 0, 0.05);
            border-radius: 10px;
        }

        /* Bubble Styles */
        .msg-wrapper {
            max-width: 80%;
            animation: slideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .msg-id {
            align-self: flex-start;
        }

        .msg-foreign {
            align-self: flex-end;
        }

        .bubble {
            padding: 16px 20px;
            border-radius: 24px;
            position: relative;
            transition: transform 0.2s;
        }

        .msg-id .bubble {
            background: white;
            color: var(--text-dark);
            border-bottom-left-radius: 4px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.05);
        }

        .msg-foreign .bubble {
            background: var(--primary);
            color: white;
            border-bottom-right-radius: 4px;
            box-shadow: 0 10px 15px -3px rgba(99, 102, 241, 0.3);
        }

        .text-orig {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 5px;
            display: block;
            opacity: 0.6;
        }

        .text-tran {
            font-size: 1.05rem;
            font-weight: 500;
            line-height: 1.5;
        }

        .btn-replay {
            background: white;
            border: none;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-top: 8px;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
            transition: 0.2s;
        }

        .btn-replay:hover {
            transform: scale(1.1);
            background: var(--primary);
            color: white;
        }

        /* Control Panel */
        .control-panel {
            background: white;
            padding: 30px;
            border-top: 1px solid #f1f5f9;
            border-radius: 0 0 32px 32px;
        }

        .status-container {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-bottom: 25px;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            background: #cbd5e1;
            border-radius: 50%;
        }

        .is-recording .status-dot {
            background: #ef4444;
            animation: blink 1s infinite;
        }

        @keyframes blink {
            50% {
                opacity: 0.3;
            }
        }

        .status-text {
            font-size: 0.75rem;
            font-weight: 700;
            color: #64748b;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        /* Mic Buttons */
        .mic-actions {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 40px;
        }

        .mic-group {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
        }

        .btn-mic {
            width: 75px;
            height: 75px;
            border-radius: 50%;
            border: none;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: pointer;
        }

        .btn-id {
            background: #f1f5f9;
            color: var(--primary);
        }

        .btn-foreign {
            background: var(--primary);
            color: white;
        }

        .btn-mic:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.1);
        }

        .btn-mic.is-recording {
            background: #ef4444 !important;
            color: white !important;
            transform: scale(1.1);
        }

        /* Wave Animation */
        .wave {
            position: absolute;
            width: 100%;
            height: 100%;
            border: 2px solid #ef4444;
            border-radius: 50%;
            opacity: 0;
            pointer-events: none;
        }

        .is-recording .wave {
            animation: wavePulse 1.5s infinite;
        }

        @keyframes wavePulse {
            0% {
                transform: scale(1);
                opacity: 0.8;
            }

            100% {
                transform: scale(2);
                opacity: 0;
            }
        }

        .label-lang {
            font-size: 0.7rem;
            font-weight: 800;
            color: #94a3b8;
        }
    </style>
</head>

<body>

    <div class="app-container">
        <header>
            <h1>
                <span class="material-symbols-rounded brand-icon" style="font-size: 32px;">Auto_Awesome</span>
                <span style="color: var(--primary);">SS<span style="color: #f59e0b;">Translator</span></span>
            </h1>

            <div class="lang-select-wrapper">
                <select id="foreignLang" class="lang-select">
                    <optgroup label="Paling Sering">
                        <option value="zh-CN" selected>🇨🇳 Mandarin</option>
                        <option value="en-US">🇺🇸 English</option>
                        <option value="ar-SA">🇸🇦 Arabic</option>
                        <option value="ja-JP">🇯🇵 Japanese</option>
                        <option value="ko-KR">🇰🇷 Korean</option>
                    </optgroup>
                    <optgroup label="Asia">
                        <option value="th-TH">🇹🇭 Thai</option>
                        <option value="vi-VN">🇻🇳 Vietnamese</option>
                        <option value="hi-IN">🇮🇳 Hindi</option>
                    </optgroup>
                </select>
            </div>
        </header>

        <div id="chatBox">
            <!-- Contoh Welcome Message -->
            <div class="msg-wrapper msg-id">
                <div class="bubble">
                    <span class="text-orig">System</span>
                    <span class="text-tran">Halo! Tekan tombol mikrofon di bawah untuk mulai menerjemahkan secara real-time.</span>
                </div>
            </div>
        </div>

        <div class="control-panel">
            <div id="statusWrapper" class="status-container">
                <div class="status-dot"></div>
                <div id="status" class="status-text">Standby System</div>
            </div>

            <div class="mic-actions">
                <div class="mic-group">
                    <button id="btnID" class="btn-mic btn-id">
                        <div class="wave"></div>
                        <span class="material-symbols-rounded" style="font-size: 35px;">mic</span>
                    </button>
                    <span class="label-lang">INDONESIA</span>
                </div>

                <div class="mic-group">
                    <button id="btnForeign" class="btn-mic btn-foreign">
                        <div class="wave"></div>
                        <span class="material-symbols-rounded" style="font-size: 35px;">mic</span>
                    </button>
                    <span id="foreignLabel" class="label-lang">CHINA</span>
                </div>
            </div>
        </div>
    </div>

    <script>
        const chatBox = document.getElementById('chatBox');
        const foreignLang = document.getElementById('foreignLang');
        const foreignLabel = document.getElementById('foreignLabel');
        const status = document.getElementById('status');
        const statusWrapper = document.getElementById('statusWrapper');

        // FIX 1: Inisialisasi SpeechSynthesis untuk Mobile
        let synth = window.speechSynthesis;
        let voices = [];

        // Fungsi untuk "memancing" suara agar aktif di HP
        function unlockAudio() {
            const msg = new SpeechSynthesisUtterance(' ');
            synth.speak(msg);
            console.log("Audio Unlocked");
            // Hapus event listener setelah dijalankan sekali
            document.removeEventListener('touchstart', unlockAudio);
            document.removeEventListener('click', unlockAudio);
        }
        // Jalankan unlock saat user menyentuh layar pertama kali
        document.addEventListener('touchstart', unlockAudio);
        document.addEventListener('click', unlockAudio);

        function loadVoices() {
            voices = synth.getVoices();
        }
        if (speechSynthesis.onvoiceschanged !== undefined) {
            speechSynthesis.onvoiceschanged = loadVoices;
        }

        foreignLang.onchange = () => {
            const selectedText = foreignLang.options[foreignLang.selectedIndex].text;
            const cleanText = selectedText.replace(/[\uD800-\uDBFF][\uDC00-\uDFFF]|[^a-zA-Z]/g, "").toUpperCase();
            foreignLabel.innerText = cleanText;
        };

        // Pengaturan Speech Recognition
        const Recognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (!Recognition) {
            alert("Browser Anda tidak mendukung Speech Recognition. Gunakan Chrome atau Safari terbaru.");
        }

        const recognition = new Recognition();
        recognition.interimResults = false;
        recognition.continuous = false; // Penting untuk mobile agar tidak menggantung

        let currentMode = "";

        document.getElementById('btnID').onclick = () => startMic("id-ID", "id");
        document.getElementById('btnForeign').onclick = () => startMic(foreignLang.value, "foreign");

        function startMic(lang, mode) {
            currentMode = mode;
            recognition.lang = lang;

            // Reset suara jika sedang ada yang bicara
            synth.cancel();

            try {
                recognition.start();
            } catch (e) {
                recognition.stop();
            }

            status.innerText = "Mendengarkan...";
            statusWrapper.classList.add('is-recording');

            if (mode === 'id') document.getElementById('btnID').classList.add('is-recording');
            else document.getElementById('btnForeign').classList.add('is-recording');
        }

        recognition.onresult = (event) => {
            const transcript = event.results[0][0].transcript;
            const sl = (currentMode === "id" ? "id" : foreignLang.value);
            const tl = (currentMode === "id" ? foreignLang.value : "id");
            processTranslation(transcript, sl, tl);
        };

        recognition.onerror = (event) => {
            console.error("Speech Error: ", event.error);
            status.innerText = "Error: " + event.error;
            stopUI();
        };

        recognition.onend = () => {
            stopUI();
        };

        function stopUI() {
            document.querySelectorAll('.btn-mic').forEach(b => b.classList.remove('is-recording'));
            statusWrapper.classList.remove('is-recording');
            status.innerText = "Standby System";
        }

        function processTranslation(text, sl, tl) {
            status.innerText = "Menerjemahkan...";

            // Menggunakan MyMemory API (Gratis & Tanpa API Key)
            // Format langpair = sumber|target (contoh: id|zh-CN)
            const apiUrl = `https://api.mymemory.translated.net/get?q=${encodeURIComponent(text)}&langpair=${sl}|${tl}`;

            fetch(apiUrl)
                .then(response => response.json())
                .then(data => {
                    if (data.responseData) {
                        const translatedText = data.responseData.translatedText;
                        addBubble(text, translatedText, currentMode, tl);

                        setTimeout(() => {
                            speak(translatedText, tl);
                        }, 300);
                        status.innerText = "Selesai";
                    } else {
                        status.innerText = "Gagal menerjemahkan";
                    }
                })
                .catch(err => {
                    status.innerText = "Gagal koneksi API!";
                    console.error(err);
                });
        }

        function addBubble(orig, tran, mode, lang) {
            const wrap = document.createElement('div');
            wrap.className = `msg-wrapper ${mode === 'id' ? 'msg-id' : 'msg-foreign'}`;

            // Gunakan fungsi pembersih karakter agar onclick tidak rusak
            const safeTran = tran.replace(/"/g, '&quot;').replace(/'/g, "\\'");

            wrap.innerHTML = `
        <div class="bubble">
            <span class="text-orig">${orig}</span>
            <span class="text-tran">${tran}</span>
        </div>
        <button class="btn-replay" onclick="speak('${safeTran}', '${lang}')">
            <span class="material-symbols-rounded" style="font-size:18px">play_arrow</span>
        </button>
    `;
            chatBox.appendChild(wrap);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        // FIX 3: Fungsi Speak yang lebih tangguh untuk berbagai Merk HP
        function speak(text, lang) {
            // Batalkan suara yang sedang berjalan
            synth.cancel();

            if (text.trim() === "") return;

            const utterance = new SpeechSynthesisUtterance(text);

            // Set bahasa
            utterance.lang = lang;

            // Cari suara yang paling cocok dengan bahasa target
            // Beberapa HP (seperti Oppo/Xiaomi) butuh pemilihan voice secara eksplisit
            if (voices.length === 0) voices = synth.getVoices();

            const matchedVoice = voices.find(v => v.lang.includes(lang) || v.lang.includes(lang.split('-')[0]));
            if (matchedVoice) {
                utterance.voice = matchedVoice;
            }

            utterance.rate = 1.0;
            utterance.pitch = 1.0;
            utterance.volume = 1.0;

            // Masalah di Android Chrome: Terkadang suara berhenti tiba-tiba
            // Kita panggil resume setiap kali bicara
            synth.resume();
            synth.speak(utterance);
        }
    </script>
</body>

</html>

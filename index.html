<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SSTranslator - AI Pro Multi-Language</title>
    <link rel="shortcut icon" href="img/favicon.ico">

    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,1,0" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Library Transliterasi Pinyin (Mandarin) -->
    <script src="https://unpkg.com/pinyin-pro"></script>

    <style>
        :root {
            --primary: #6366f1;
            --primary-light: #818cf8;
            --accent: #f59e0b;
            --bg-gradient: linear-gradient(135deg, #e0e7ff 0%, #f3e8ff 100%);
            --glass-bg: rgba(255, 255, 255, 0.7);
            --glass-border: rgba(255, 255, 255, 0.4);
            --text-dark: #1e293b;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: var(--bg-gradient);
            background-attachment: fixed;
            height: 100dvh;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            color: var(--text-dark);
        }

        .app-container {
            width: 100%;
            max-width: 900px;
            height: 100%;
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            display: flex;
            flex-direction: column;
            position: relative;
            border: 1px solid var(--glass-border);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.1);
        }

        @media (min-width: 768px) {
            .app-container {
                height: 90vh;
                border-radius: 32px;
            }
        }

        header {
            padding: 20px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(255, 255, 255, 0.3);
            border-bottom: 1px solid var(--glass-border);
            border-radius: inherit;
        }

        header h1 {
            font-size: 1.2rem;
            font-weight: 800;
            margin: 0;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .brand-icon {
            background: linear-gradient(135deg, var(--accent), #f97316);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .lang-select-wrapper {
            background: white;
            padding: 4px 8px;
            border-radius: 12px;
            border: 1px solid #e2e8f0;
            max-width: 50%;
        }

        .lang-select {
            border: none;
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--text-dark);
            outline: none;
            background: transparent;
            cursor: pointer;
            width: 100%;
        }

        #chatBox {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            scroll-behavior: smooth;
        }

        .msg-wrapper {
            max-width: 85%;
            animation: slideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .msg-id { align-self: flex-start; }
        .msg-foreign { align-self: flex-end; }

        .bubble {
            padding: 14px 18px;
            border-radius: 20px;
            position: relative;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
        }

        .msg-id .bubble {
            background: white;
            color: var(--text-dark);
            border-bottom-left-radius: 4px;
        }

        .msg-foreign .bubble {
            background: var(--primary);
            color: white;
            border-bottom-right-radius: 4px;
        }

        .text-orig {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 4px;
            display: block;
            opacity: 0.6;
        }

        .text-tran {
            font-size: 1.05rem;
            font-weight: 600;
            line-height: 1.3;
            display: block;
        }

        .text-translit {
            font-size: 0.85rem;
            font-style: italic;
            display: block;
            margin-top: 4px;
            opacity: 0.9;
            color: #fcd34d;
        }

        .msg-id .text-translit { color: var(--primary); }

        .btn-replay {
            background: white;
            border: none;
            width: 28px;
            height: 28px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-top: 5px;
            cursor: pointer;
            transition: 0.2s;
        }

        .btn-replay:hover { background: var(--primary); color: white; }

        .control-panel {
            background: white;
            padding: 20px 30px;
            border-top: 1px solid #f1f5f9;
            border-radius: 0 0 32px 32px;
        }

        .status-container {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-bottom: 15px;
        }

        .status-dot { width: 8px; height: 8px; background: #cbd5e1; border-radius: 50%; }
        .is-recording .status-dot { background: #ef4444; animation: blink 1s infinite; }
        @keyframes blink { 50% { opacity: 0.3; } }

        .status-text {
            font-size: 0.65rem;
            font-weight: 700;
            color: #64748b;
            text-transform: uppercase;
            letter-spacing: 1.5px;
        }

        .mic-actions {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 30px;
        }

        .mic-group { display: flex; flex-direction: column; align-items: center; gap: 8px; }

        .btn-mic {
            width: 65px;
            height: 65px;
            border-radius: 50%;
            border: none;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            transition: 0.3s;
            cursor: pointer;
        }

        .btn-id { background: #f1f5f9; color: var(--primary); }
        .btn-foreign { background: var(--primary); color: white; }

        .btn-mic.is-recording { background: #ef4444 !important; color: white !important; transform: scale(1.1); }

        .wave {
            position: absolute;
            width: 100%; height: 100%;
            border: 2px solid #ef4444;
            border-radius: 50%;
            opacity: 0;
            pointer-events: none;
        }
        .is-recording .wave { animation: wavePulse 1.5s infinite; }
        @keyframes wavePulse {
            0% { transform: scale(1); opacity: 0.8; }
            100% { transform: scale(1.8); opacity: 0; }
        }

        .label-lang { font-size: 0.65rem; font-weight: 800; color: #94a3b8; }
    </style>
</head>

<body>

    <div class="app-container">
        <header>
            <h1>
                <span class="material-symbols-rounded brand-icon">Auto_Awesome</span>
                <span style="color: var(--primary);">SS<span style="color: #f59e0b;">Translator</span></span>
            </h1>

            <div class="lang-select-wrapper">
                <select id="foreignLang" class="lang-select">
                    <optgroup label="Paling Sering">
                        <option value="en-US">🇺🇸 English</option>
                        <option value="zh-CN" selected>🇨🇳 Mandarin</option>
                        <option value="ja-JP">🇯🇵 Japanese</option>
                        <option value="ko-KR">🇰🇷 Korean</option>
                        <option value="ar-SA">🇸🇦 Arabic</option>
                    </optgroup>
                    <optgroup label="Asia & Pasifik">
                        <option value="th-TH">🇹🇭 Thai</option>
                        <option value="vi-VN">🇻🇳 Vietnamese</option>
                        <option value="hi-IN">🇮🇳 Hindi</option>
                        <option value="ms-MY">🇲🇾 Melayu</option>
                        <option value="tl-PH">🇵🇭 Filipino</option>
                    </optgroup>
                    <optgroup label="Eropa">
                        <option value="fr-FR">🇫🇷 French</option>
                        <option value="de-DE">🇩🇪 German</option>
                        <option value="ru-RU">🇷🇺 Russian</option>
                        <option value="es-ES">🇪🇸 Spanish</option>
                        <option value="it-IT">🇮🇹 Italian</option>
                        <option value="nl-NL">🇳🇱 Dutch</option>
                        <option value="tr-TR">🇹🇷 Turkish</option>
                    </optgroup>
                </select>
            </div>
        </header>

        <div id="chatBox"></div>

        <div class="control-panel">
            <div id="statusWrapper" class="status-container">
                <div class="status-dot"></div>
                <div id="status" class="status-text">Standby System</div>
            </div>

            <div class="mic-actions">
                <div class="mic-group">
                    <button id="btnID" class="btn-mic btn-id">
                        <div class="wave"></div>
                        <span class="material-symbols-rounded" style="font-size: 30px;">mic</span>
                    </button>
                    <span class="label-lang">INDONESIA</span>
                </div>

                <div class="mic-group">
                    <button id="btnForeign" class="btn-mic btn-foreign">
                        <div class="wave"></div>
                        <span class="material-symbols-rounded" style="font-size: 30px;">mic</span>
                    </button>
                    <span id="foreignLabel" class="label-lang">CHINA</span>
                </div>
            </div>
        </div>
    </div>

    <script>
        const chatBox = document.getElementById('chatBox');
        const foreignLang = document.getElementById('foreignLang');
        const foreignLabel = document.getElementById('foreignLabel');
        const status = document.getElementById('status');
        const statusWrapper = document.getElementById('statusWrapper');

        let synth = window.speechSynthesis;
        let voices = [];

        function loadVoices() {
            voices = synth.getVoices();
        }
        if (speechSynthesis.onvoiceschanged !== undefined) {
            speechSynthesis.onvoiceschanged = loadVoices;
        }

        // Update Label secara dinamis
        foreignLang.onchange = () => {
            const selectedOption = foreignLang.options[foreignLang.selectedIndex];
            // Mengambil nama bahasa saja (menghapus emoji)
            const cleanText = selectedOption.text.replace(/[\uD800-\uDBFF][\uDC00-\uDFFF]/g, '').trim().toUpperCase();
            foreignLabel.innerText = cleanText;
        };

        const Recognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        const recognition = new Recognition();
        recognition.interimResults = false;
        recognition.continuous = false;

        let currentMode = "";

        document.getElementById('btnID').onclick = () => startMic("id-ID", "id");
        document.getElementById('btnForeign').onclick = () => startMic(foreignLang.value, "foreign");

        function startMic(lang, mode) {
            currentMode = mode;
            recognition.lang = lang;
            synth.cancel();
            try { recognition.start(); } catch (e) { recognition.stop(); }
            
            status.innerText = "Mendengarkan...";
            statusWrapper.classList.add('is-recording');
            if (mode === 'id') document.getElementById('btnID').classList.add('is-recording');
            else document.getElementById('btnForeign').classList.add('is-recording');
        }

        recognition.onresult = (event) => {
            const transcript = event.results[0][0].transcript;
            const sl = (currentMode === "id" ? "id" : foreignLang.value.split('-')[0]);
            const tl = (currentMode === "id" ? foreignLang.value.split('-')[0] : "id");
            processTranslation(transcript, sl, tl);
        };

        recognition.onend = () => stopUI();

        function stopUI() {
            document.querySelectorAll('.btn-mic').forEach(b => b.classList.remove('is-recording'));
            statusWrapper.classList.remove('is-recording');
            status.innerText = "Standby System";
        }

        async function processTranslation(text, sl, tl) {
    status.innerText = "Gemini AI sedang berpikir...";
    
    const API_KEY = "AQ.Ab8RN6KbW1sX4NwG8cUp58EAMBvzCaS1wvygmROHQsIlQ2-y0Q"; // Masukkan key AQ kamu di sini
    
    // PERHATIKAN: Kita hapus ?key= dari URL
    const endpoint = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent`;

    try {
        const response = await fetch(endpoint, {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                // PINDAHKAN KEY KE SINI
                'x-goog-api-key': API_KEY 
            },
            body: JSON.stringify({
                contents: [{ parts: [{ text: `Terjemahkan ke ${tl}: ${text}. Balas dalam JSON: {"translated": "hasil", "pronunciation": "cara baca"}` }] }]
            })
        });

        const data = await response.json();
        
        if (data.error) {
            console.error("API Error:", data.error);
            status.innerText = "Error: " + data.error.message;
            return;
        }

        // Lanjutkan proses AddBubble seperti biasa...
        const aiResponse = data.candidates[0].content.parts[0].text;
        const result = JSON.parse(aiResponse.replace(/```json|```/g, ""));
        addBubble(text, result.translated, currentMode, (currentMode === "id" ? foreignLang.value : "id-ID"), result.pronunciation);
        speak(result.translated, (currentMode === "id" ? foreignLang.value : "id-ID"));
        status.innerText = "Selesai";

    } catch (err) {
        status.innerText = "Gagal koneksi AI!";
        console.error(err);
    }
}

        function addBubble(orig, tran, mode, lang, translit = "") {
            const wrap = document.createElement('div');
            wrap.className = `msg-wrapper ${mode === 'id' ? 'msg-id' : 'msg-foreign'}`;

            const translitHtml = translit ? `<span class="text-translit">${translit}</span>` : "";
            const safeTran = tran.replace(/'/g, "\\'");

            wrap.innerHTML = `
                <div class="bubble">
                    <span class="text-orig">${orig}</span>
                    <span class="text-tran">${tran}</span>
                    ${translitHtml}
                </div>
                <button class="btn-replay" onclick="speak('${safeTran}', '${lang}')">
                    <span class="material-symbols-rounded" style="font-size:16px">play_arrow</span>
                </button>
            `;
            chatBox.appendChild(wrap);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        function speak(text, lang) {
            synth.cancel();
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = lang;
            
            // Mencocokkan suara yang paling sesuai dengan device
            if (voices.length === 0) voices = synth.getVoices();
            const matchedVoice = voices.find(v => v.lang.includes(lang.replace('-', '_')) || v.lang.includes(lang.split('-')[0]));
            if (matchedVoice) utterance.voice = matchedVoice;
            
            synth.speak(utterance);
        }
    </script>
</body>

</html>

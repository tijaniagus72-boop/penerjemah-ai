<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SSTranslator - AI Pro Gemini</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,1,0" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        :root {
            --primary: #6366f1;
            --accent: #f59e0b;
            --bg-gradient: linear-gradient(135deg, #e0e7ff 0%, #f3e8ff 100%);
            --glass-bg: rgba(255, 255, 255, 0.7);
            --text-dark: #1e293b;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: var(--bg-gradient);
            background-attachment: fixed;
            height: 100dvh;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        .app-container {
            width: 100%; max-width: 900px; height: 100%;
            background: var(--glass-bg);
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            display: flex; flex-direction: column;
            border: 1px solid rgba(255,255,255,0.4);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.1);
        }

        @media (min-width: 768px) { .app-container { height: 85vh; border-radius: 32px; } }

        header {
            padding: 24px 30px; display: flex; justify-content: space-between; align-items: center;
            background: rgba(255, 255, 255, 0.3); border-radius: inherit;
        }

        .brand-icon { background: linear-gradient(135deg, var(--accent), #f97316); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        #chatBox { flex: 1; overflow-y: auto; padding: 30px; display: flex; flex-direction: column; gap: 20px; }

        /* Bubble Styles */
        .msg-wrapper { max-width: 85%; animation: slideUp 0.4s ease-out; position: relative; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .msg-id { align-self: flex-start; }
        .msg-foreign { align-self: flex-end; text-align: right; }

        .bubble { padding: 16px 20px; border-radius: 24px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .msg-id .bubble { background: white; border-bottom-left-radius: 4px; color: var(--text-dark); }
        .msg-foreign .bubble { background: var(--primary); border-bottom-right-radius: 4px; color: white; text-align: left; }

        .text-orig { font-size: 0.7rem; text-transform: uppercase; opacity: 0.6; display: block; margin-bottom: 4px; }
        .text-tran { font-size: 1.1rem; font-weight: 600; display: block; }
        .text-translit { font-size: 0.9rem; font-style: italic; opacity: 0.8; display: block; margin-top: 5px; color: #fbbf24; }
        .msg-id .text-translit { color: var(--primary); }

        .control-panel { background: white; padding: 25px; border-radius: 0 0 32px 32px; }
        
        .btn-mic {
            width: 70px; height: 70px; border-radius: 50%; border: none;
            display: flex; align-items: center; justify-content: center;
            transition: all 0.3s; cursor: pointer; position: relative;
        }
        .btn-id { background: #f1f5f9; color: var(--primary); }
        .btn-foreign { background: var(--primary); color: white; }
        .is-recording { background: #ef4444 !important; color: white !important; transform: scale(1.1); }

        .status-text { font-size: 0.7rem; font-weight: 800; text-transform: uppercase; color: #94a3b8; letter-spacing: 1px; }
        
        /* Wave Effect */
        .wave { position: absolute; width: 100%; height: 100%; border: 2px solid #ef4444; border-radius: 50%; opacity: 0; pointer-events: none; }
        .is-recording .wave { animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { transform: scale(1); opacity: 0.8; } 100% { transform: scale(2); opacity: 0; } }

        select { border: 1px solid #e2e8f0; border-radius: 10px; padding: 5px 10px; font-weight: 600; outline: none; }
    </style>
</head>

<body>

    <div class="app-container">
        <header>
            <h1 style="font-size: 1.3rem; font-weight: 800; margin: 0;">
                <span class="material-symbols-rounded brand-icon">auto_awesome</span>
                <span style="color: var(--primary);">SS<span style="color: var(--accent);">Translator</span> <small style="font-size: 0.6rem; vertical-align: middle; background: #fee2e2; color: #ef4444; padding: 2px 6px; border-radius: 6px;">GEMINI AI PRO</small></span>
            </h1>
            <select id="foreignLang">
                <option value="Mandarin Chinese" data-code="zh-CN">🇨🇳 Mandarin</option>
                <option value="English" data-code="en-US">🇺🇸 English</option>
                <option value="Japanese" data-code="ja-JP">🇯🇵 Japanese</option>
                <option value="Korean" data-code="ko-KR">🇰🇷 Korean</option>
                <option value="Arabic" data-code="ar-SA">🇸🇦 Arabic</option>
            </select>
        </header>

        <div id="chatBox">
            <div class="msg-wrapper msg-id">
                <div class="bubble">
                    <span class="text-tran">Selamat datang di versi AI Pro. Silakan tekan mic untuk bicara.</span>
                </div>
            </div>
        </div>

        <div class="control-panel">
            <div class="text-center mb-3">
                <div id="status" class="status-text">Standby System</div>
            </div>
            <div class="d-flex justify-content-center align-items: center; gap: 40px;">
                <div class="text-center">
                    <button id="btnID" class="btn-mic btn-id">
                        <div class="wave"></div>
                        <span class="material-symbols-rounded" style="font-size: 30px;">mic</span>
                    </button>
                    <div class="status-text mt-2">Indonesia</div>
                </div>
                <div class="text-center">
                    <button id="btnForeign" class="btn-mic btn-foreign">
                        <div class="wave"></div>
                        <span class="material-symbols-rounded" style="font-size: 30px;">mic</span>
                    </button>
                    <div id="foreignLabel" class="status-text mt-2">Mandarin</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // --- KONFIGURASI ---
        const GEMINI_API_KEY = "AQ.Ab8RN6JHRyIfuhzTq4sT8q9zwFv1rp0rVe235zE29i3QhCge8A"; 
        // ------------------

        const chatBox = document.getElementById('chatBox');
        const status = document.getElementById('status');
        const foreignLang = document.getElementById('foreignLang');
        
        let synth = window.speechSynthesis;
        const Recognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        const recognition = new Recognition();

        // Update Label
        foreignLang.onchange = () => {
            document.getElementById('foreignLabel').innerText = foreignLang.options[foreignLang.selectedIndex].text.replace(/[^a-zA-Z]/g, "");
        };

        function startMic(langCode, mode) {
            recognition.lang = langCode;
            recognition.start();
            
            status.innerText = "Mendengarkan...";
            const btn = mode === 'id' ? document.getElementById('btnID') : document.getElementById('btnForeign');
            btn.classList.add('is-recording');

            recognition.onresult = (event) => {
                const text = event.results[0][0].transcript;
                const targetLang = mode === 'id' ? foreignLang.value : "Indonesian";
                const sourceLang = mode === 'id' ? "Indonesian" : foreignLang.value;
                const targetCode = mode === 'id' ? foreignLang.options[foreignLang.selectedIndex].dataset.code : "id-ID";
                
                translateWithGemini(text, sourceLang, targetLang, mode, targetCode);
            };

            recognition.onend = () => {
                btn.classList.remove('is-recording');
                status.innerText = "Standby";
            };
        }

        document.getElementById('btnID').onclick = () => startMic('id-ID', 'id');
        document.getElementById('btnForeign').onclick = () => startMic(foreignLang.options[foreignLang.selectedIndex].dataset.code, 'foreign');

        async function translateWithGemini(text, from, to, mode, tCode) {
            status.innerText = "AI sedang berpikir...";
            
            const prompt = `Translate this text from ${from} to ${to}. 
            If the target language uses non-latin characters (like Chinese, Japanese, Korean, Arabic), provide transliteration.
            Return ONLY a JSON object with this format: 
            {"translation": "hasil terjemahan", "transliteration": "cara baca/pinyin/romaji atau kosongkan jika latin"}`;

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${GEMINI_API_KEY}`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: prompt + "\n\nText: " + text }] }]
                    })
                });

                const data = await response.json();
                const resText = data.candidates[0].content.parts[0].text;
                
                // Parsing hasil JSON dari AI
                const cleanJson = resText.replace(/```json|```/g, "").trim();
                const result = JSON.parse(cleanJson);

                addBubble(text, result.translation, result.transliteration, mode, tCode);
                speak(result.translation, tCode);
                
            } catch (error) {
                console.error(error);
                status.innerText = "Gagal menghubungi Gemini AI";
            }
        }

        function addBubble(orig, tran, translit, mode, lang) {
            const wrap = document.createElement('div');
            wrap.className = `msg-wrapper ${mode === 'id' ? 'msg-id' : 'msg-foreign'}`;
            
            wrap.innerHTML = `
                <div class="bubble">
                    <span class="text-orig">${orig}</span>
                    <span class="text-tran">${tran}</span>
                    ${translit ? `<span class="text-translit">${translit}</span>` : ''}
                </div>
            `;
            
            chatBox.appendChild(wrap);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        function speak(text, lang) {
            synth.cancel();
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = lang;
            synth.speak(utterance);
        }
    </script>
</body>
</html>
